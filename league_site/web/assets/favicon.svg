<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="League of Agents">
  <!-- League of Agents: the crossed-swords mark, worn in agentculture.org's
       "dawn" palette. Same accent values as the family favicon
       (light #0b655c / dark #7fdcc9) — so the family is obvious at a glance.
       Hardcoded hex, not CSS tokens: a favicon travels alone, with no
       stylesheet to resolve custom properties. The prefers-color-scheme
       dark variant mirrors the site's own light/dark accent swap. -->
  <title>League of Agents</title>
  <text class="mark" x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-size="52" font-family="Georgia, 'Times New Roman', serif">⚔</text>
  <style>
    .mark { fill: #0b655c; }
    @media (prefers-color-scheme: dark) {
      .mark { fill: #7fdcc9; }
    }
  </style>
</svg>

AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  League of Agents platform — serverless deploy stack. Lambda (WSGI adapter)
  behind an API Gateway HTTP API, a single-table DynamoDB match store, an S3
  archive bucket, a daily scheduled cleanup Lambda enforcing the committed
  capacity config (see docs/capacity.md), and a Budget alarm pinned to a 20
  USD/month ceiling (see docs/deploy.md and docs/architecture.md). Every
  sizing choice below is commented against that ceiling, not against
  generic best practice. Intrinsic functions are written in long form
  (Fn::Sub/Ref/Fn::GetAtt instead of !Sub/!Ref/!GetAtt) on purpose: it keeps
  this file parseable as plain YAML by any standard loader, with no
  CloudFormation-specific tag handling required by tooling that just wants
  to inspect it (see tests/test_lambda_template.py).

# --- parameters --------------------------------------------------------------
# One stage per deploy target (e.g. "prod", "dev"). Stateful resource names
# (table, bucket) and the Lambda function name are namespaced by StageName so
# a second stage never collides with — or accidentally shares billing with —
# the first.

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: >-
      API Gateway stage / resource-name namespace. Keep this short — it
      prefixes every stateful resource name below.
  MonthlyBudgetUsd:
    Type: Number
    Default: 20
    Description: Hard monthly cost ceiling in USD (see the Budget resource below).
  BudgetAlertEmail:
    Type: String
    Description: >-
      Email address that receives AWS Budgets threshold notifications. No
      default on purpose — the operator must supply a real address at
      deploy time (see infra/deploy.sh).
  SessionSecretValue:
    Type: String
    NoEcho: true
    Default: ""
    Description: >-
      HMAC signing secret for session tokens (league_site.auth.sessions,
      SESSION_SECRET_ENV=LEAGUE_SESSION_SECRET). Empty by default, which
      leaves sessions disabled — there is no OAuth login flow deployed yet
      for a secret to protect. NoEcho so CloudFormation never surfaces the
      value in the console/CLI/DescribeStacks output once an operator sets
      it at deploy time.

  # The four capacity caps below default to exactly
  # league_site.capacity.config.CapacityConfig.default()'s values —
  # tests/test_lambda_template.py cross-checks that against the Python
  # source directly, so the two cannot silently drift. See
  # docs/capacity.md and that module's docstring for the full price
  # reasoning behind each number.
  MaxConcurrentMatches:
    Type: Number
    Default: 50
    Description: >-
      Hard cap on matches with status ACTIVE or PAUSED at once — new
      matches over this cap are refused, not degraded (see
      league_site.capacity.guard.check_capacity).
  MaxStoredMatches:
    Type: Number
    Default: 500
    Description: >-
      Hard cap on total matches held in the hot DynamoDB table regardless
      of status; the cleanup job archives the oldest completed matches
      first once this is exceeded.
  MaxMatchAgeDaysHot:
    Type: Number
    Default: 3
    Description: >-
      Days a completed match stays in the hot DynamoDB table before the
      cleanup job archives it to S3 and deletes the hot copy.
  MaxArchiveAgeDays:
    Type: Number
    Default: 180
    Description: >-
      Days an S3 match archive is retained before the cleanup job deletes
      it outright (the durable historical record is the versioned JSONL
      dataset export, not this raw per-match archive).

# --- globals -------------------------------------------------------------
# Applied to every AWS::Serverless::Function in this template (there is
# exactly one). Centralized here so cost-relevant defaults are visible in
# one place rather than duplicated per-function as the stack grows.

Globals:
  Function:
    Runtime: python3.12
    # arm64 (Graviton2): AWS bills ~20% less per GB-second than x86_64 at
    # equivalent performance for this kind of I/O-light, non-native-extension
    # workload (pure-Python WSGI + markdown rendering) — a straightforward
    # saving against the 20 USD ceiling with no downside here.
    Architectures:
      - arm64
    # 256 MB is the smallest size that keeps cold starts reasonable for a
    # pure-Python handler at this dependency footprint; Lambda cost is
    # GB-seconds, so this is the main compute lever against the ceiling.
    # Bump it only if profiling shows it paying for itself in latency.
    MemorySize: 256
    # Generous relative to actual handler latency (markdown lookups are
    # microseconds), but still caps the worst-case cost of a runaway/looping
    # invocation at 10s x MemorySize instead of the 900s maximum.
    Timeout: 10
    # X-Ray tracing bills per trace with no operational payoff at this
    # scale (single Lambda, no fan-out to trace) — left off to avoid an
    # unbounded-by-traffic cost line.
    Tracing: Disabled

# --- resources -------------------------------------------------------------
# Exactly ten: the HTTP API, the HTTP Lambda function and its log group,
# the scheduled cleanup Lambda function and its log group, the three
# DynamoDB tables (matches, tokens, ratings), the S3 archive bucket, and
# the Budget alarm. (SAM's transform additionally provisions an IAM
# execution role per function, an API stage, and — for the cleanup
# function's Schedule event below — an EventBridge rule plus the Lambda
# invoke permission it needs; those are implicit, not written here.)

Resources:
  # API Gateway HTTP API (not REST API) — HTTP APIs are billed per request
  # at roughly a third of REST API's price and have no per-hour base charge,
  # which matters most against a 20 USD ceiling at low/bursty traffic.
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName:
        Ref: StageName
      # Throttling is a cost circuit breaker: it bounds how many Lambda
      # invocations (and therefore how much GB-seconds + DynamoDB/S3 spend)
      # a traffic spike or a client bug can generate before the Budget
      # alarm below even has a chance to fire.
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  # The WSGI-on-Lambda adapter (league_site.aws_lambda.handler.handler),
  # fronting the agentfront HTTP app behind the HTTP API above.
  HttpHandlerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      # pyproject.toml is frozen for this task and there is no
      # requirements.txt at the repo root (this project uses uv + a PEP 621
      # pyproject.toml), so SAM's built-in Python build workflow — which
      # only looks for requirements.txt — can't build this function. A
      # Makefile build target (the repo-root Makefile) instead runs
      # `pip install --target "$(ARTIFACTS_DIR)" .` from the repo root,
      # which reads pyproject.toml directly. See the repo-root Makefile and
      # docs/deploy.md.
      BuildMethod: makefile
    Properties:
      FunctionName:
        Fn::Sub: "league-of-agents-${StageName}-http"
      CodeUri: ../
      Handler: league_site.aws_lambda.handler.handler
      Environment:
        Variables:
          # Not read by the handler today (league_site/aws_lambda/handler.py
          # only serves the WSGI app, no boto3 import) — provisioned ahead of
          # the later task that wires league_site.matches/auth/ratings
          # persistence into the deployed stack, so that task has these
          # names ready without a second template change. Names must match
          # exactly: MATCHES_TABLE_NAME/ARCHIVE_BUCKET_NAME are cross-checked
          # against league_site.cli._commands._stores' MATCHES_TABLE_ENV/
          # ARCHIVE_BUCKET_ENV constants, and LEAGUE_SESSION_SECRET against
          # league_site.auth.sessions.SESSION_SECRET_ENV (see
          # tests/test_lambda_template.py).
          MATCHES_TABLE_NAME:
            Ref: MatchesTable
          ARCHIVE_BUCKET_NAME:
            Ref: ArchiveBucket
          TOKENS_TABLE_NAME:
            Ref: TokensTable
          RATINGS_TABLE_NAME:
            Ref: RatingsTable
          # Empty string (SessionSecretValue's default) means sessions are
          # disabled — league_site.auth.sessions.verify/issue require a
          # non-empty secret; see that parameter's own comment above for why
          # an empty default is fine pre-OAuth.
          LEAGUE_SESSION_SECRET:
            Ref: SessionSecretValue
          # Same "provisioned ahead of the wiring task" reasoning as the
          # variables above: the match-create path will call
          # league_site.capacity.guard.check_capacity, built from
          # league_site.capacity.config.CapacityConfig.from_env(), which
          # reads exactly these four LEAGUE_CAPACITY_* names.
          LEAGUE_CAPACITY_MAX_CONCURRENT_MATCHES:
            Ref: MaxConcurrentMatches
          LEAGUE_CAPACITY_MAX_STORED_MATCHES:
            Ref: MaxStoredMatches
          LEAGUE_CAPACITY_MAX_MATCH_AGE_DAYS_HOT:
            Ref: MaxMatchAgeDaysHot
          LEAGUE_CAPACITY_MAX_ARCHIVE_AGE_DAYS:
            Ref: MaxArchiveAgeDays
      # Scoped CRUD access to exactly this stack's own tables/bucket — no
      # wildcard AWS-managed policies. Mostly unused by the handler today
      # (same reason as the env vars above); granting it now means the
      # later persistence-wiring task is a code change only, not an IAM
      # change too. DynamoDBCrudPolicy's generated statement already covers
      # `<table-arn>/index/*` (every GSI on that table), so MatchesTable's
      # grant below already includes Query access to the by-status-updated
      # GSI added on MatchesTable further down; the trailing inline
      # statement makes that specific grant explicit and named for
      # least-privilege auditability rather than relying on the wildcard
      # alone.
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Ref: MatchesTable
        - DynamoDBCrudPolicy:
            TableName:
              Ref: TokensTable
        - DynamoDBCrudPolicy:
            TableName:
              Ref: RatingsTable
        - S3CrudPolicy:
            BucketName:
              Ref: ArchiveBucket
        - Version: "2012-10-17"
          Statement:
            - Sid: QueryMatchesByStatusUpdatedIndex
              Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                Fn::Sub: "${MatchesTable.Arn}/index/by-status-updated"
      Events:
        AnyRequest:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /{proxy+}
            Method: ANY
        # API Gateway HTTP API's greedy `{proxy+}` route above does not
        # match the bare root path — verified against the live deployed
        # stack, where GET / returned API Gateway's own 404 before this
        # route existed, not the handler's. An explicit `/` route is
        # required alongside `{proxy+}` to cover it.
        RootRequest:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /
            Method: ANY

  # CloudWatch Logs cost is retention x volume; an explicit LogGroup with a
  # short retention keeps the storage side bounded instead of accumulating
  # forever under the auto-created, "Never expire" default.
  HttpHandlerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: "/aws/lambda/${HttpHandlerFunction}"
      # 14 days is enough to debug a recent incident; this is a hosted
      # side project, not a compliance-retention workload, so there is no
      # reason to pay to keep logs longer than that.
      RetentionInDays: 14

  # The scheduled cleanup job (league_site.aws_lambda.cleanup.handler): a
  # price-aware sweep that archives stale completed matches to S3, deletes
  # aged-out S3 archives, and enforces MaxStoredMatches by archiving
  # oldest-first overflow — see docs/capacity.md for the full policy and
  # league_site.capacity.config for the price math it is tuned against.
  # Triggered daily, not more often: this job's own AWS spend is a rounding
  # error against the ceiling (see league_site.capacity.config's docstring),
  # so "daily" is chosen for freshness of the hot/archive boundary, not to
  # save cost — a job that runs less often than its own retention windows
  # need would let stale state sit around longer than MaxMatchAgeDaysHot
  # documents, not save any meaningful money by running less.
  CleanupFunction:
    Type: AWS::Serverless::Function
    Metadata:
      # Same reasoning as HttpHandlerFunction's BuildMethod: this repo has
      # no requirements.txt, so SAM's default Python build can't build it.
      BuildMethod: makefile
    Properties:
      FunctionName:
        Fn::Sub: "league-of-agents-${StageName}-cleanup"
      CodeUri: ../
      Handler: league_site.aws_lambda.cleanup.handler
      # The HTTP handler's 10s Globals default suits a request/response
      # path; this job does real work (a DynamoDB scan plus S3 list/put/
      # delete calls) proportional to MaxStoredMatches, so it gets a
      # longer, but still bounded, timeout. Even a full 60s run at 256 MB
      # is 15 GB-seconds — about two-tenths of a cent — so this remains a
      # cost non-event; the bound exists to fail a runaway run loudly
      # rather than let it run indefinitely, the same circuit-breaker
      # posture as Globals.Function.Timeout itself.
      Timeout: 60
      Environment:
        Variables:
          MATCHES_TABLE_NAME:
            Ref: MatchesTable
          ARCHIVE_BUCKET_NAME:
            Ref: ArchiveBucket
          LEAGUE_CAPACITY_MAX_CONCURRENT_MATCHES:
            Ref: MaxConcurrentMatches
          LEAGUE_CAPACITY_MAX_STORED_MATCHES:
            Ref: MaxStoredMatches
          LEAGUE_CAPACITY_MAX_MATCH_AGE_DAYS_HOT:
            Ref: MaxMatchAgeDaysHot
          LEAGUE_CAPACITY_MAX_ARCHIVE_AGE_DAYS:
            Ref: MaxArchiveAgeDays
      # Same scoped CRUD access as HttpHandlerFunction — no wildcard
      # AWS-managed policies. This function actually exercises them today
      # (unlike HttpHandlerFunction's still-unwired grant above). Same
      # "explicit + named" reasoning as HttpHandlerFunction's trailing
      # inline statement for the by-status-updated GSI: the cleanup sweep
      # queries it directly (rather than scanning) once wired, per
      # league_site/aws_lambda/cleanup.py's module docstring.
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Ref: MatchesTable
        - S3CrudPolicy:
            BucketName:
              Ref: ArchiveBucket
        - Version: "2012-10-17"
          Statement:
            - Sid: QueryMatchesByStatusUpdatedIndex
              Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                Fn::Sub: "${MatchesTable.Arn}/index/by-status-updated"
      Events:
        # A SAM Schedule event source: this is the "EventBridge scheduled
        # rule targeting the cleanup Lambda" — SAM's transform provisions
        # the underlying AWS::Events::Rule and the Lambda invoke
        # permission it needs implicitly, the same implicit-resource
        # pattern HttpApi's Events use for API Gateway routes (see the
        # comment at the top of this Resources section).
        DailySweep:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: >-
              Daily price-aware archive/cleanup sweep — see docs/capacity.md.
            Enabled: true

  CleanupFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: "/aws/lambda/${CleanupFunction}"
      # Same reasoning as HttpHandlerFunctionLogGroup: bound storage cost
      # instead of the auto-created "Never expire" default.
      RetentionInDays: 14

  # Single-table design: one item per match, PK=MATCH#<id> / SK=METADATA,
  # with the full turn history embedded as a List attribute. See
  # league_site/matches/serialization.py's module docstring for the full
  # key-scheme rationale (kept in exactly one place; not duplicated here).
  # This is a live, deployed table (league-of-agents-platform-prod) — only
  # additive changes belong here (e.g. the GSI below); TableName/BillingMode
  # must never change, since either forces a replacement.
  MatchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: "league-of-agents-${StageName}-matches"
      # On-demand (PAY_PER_REQUEST) billing: this platform's traffic is
      # bursty and low-volume (turn-based matches, not a steady stream), so
      # there is no idle-capacity floor to pay for the way provisioned mode
      # would charge one — the single biggest DynamoDB lever against the
      # ceiling at this traffic profile.
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        # status/updated_at back the by-status-updated GSI below only —
        # DynamoDB requires every key attribute used anywhere on the table
        # (base table or any index) declared once, table-wide, here. Both
        # are already plain string item attributes written by
        # league_site/matches/serialization.py's to_item (status.value,
        # updated_at.isoformat()) — no item-shape change, just indexing
        # attributes that already exist.
        - AttributeName: status
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      # Adding a GSI to an existing table is an in-place update (no
      # replacement) — see league_site/matches/aws.py's
      # DynamoDBMatchStore.list_ids docstring: this is exactly the
      # "suggested access pattern" GSI it names, finally provisioned so a
      # later handler-wiring task can Query it instead of scanning the
      # whole table. ProjectionType ALL: the handler/cleanup Query paths
      # need full match metadata back (not just the key + a few
      # attributes), and this table's items are small (see
      # league_site/capacity/config.py's per-item size reasoning), so the
      # extra projected storage is a rounding error against the ceiling —
      # the same cost posture that module documents for the base table.
      GlobalSecondaryIndexes:
        - IndexName: by-status-updated
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Agent bearer-token records, keyed by the sha256 hash of the presented
  # token (never the raw token itself) — mirrors
  # league_site/auth/aws_tokens.py's DynamoDBTokenStore lookup-by-hash
  # access pattern (verify() hashes the presented token and looks it up
  # directly; no scan needed for that path).
  # Keyed PK (HASH) / SK (RANGE) — the same single-table convention as
  # MatchesTable, because that is the item layout the store actually
  # writes: league_site/auth/aws_tokens.py puts PK="TOKEN#<hash>",
  # SK="METADATA". The first prod deploy keyed this table token_hash and
  # every get_item raised ValidationException — the key schema must mirror
  # the store's layout, not the record's semantic field names. (Physical
  # name carries an -agent-tokens suffix because fixing the key schema of
  # an explicitly named table forces a rename-replacement.)
  TokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: "league-of-agents-${StageName}-agent-tokens"
      # Same on-demand reasoning as MatchesTable: bursty, low-volume
      # traffic (token issuance/verification is not a steady stream), no
      # idle-capacity floor worth paying for at this scale.
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # Append-only per-identity rating ledger — never mutated once written.
  # Keyed PK/SK like MatchesTable/TokensTable because that is what
  # league_site/ratings/aws.py writes: PK="LEDGER#<identity>" with
  # SK="ENTRY#<seq>" per entry, plus the IDENTITIES/ORDER#<n> registry
  # partition (see that module's docstring for the full item shapes).
  # Same rename-replacement note as TokensTable above.
  RatingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: "league-of-agents-${StageName}-rating-ledger"
      # Same on-demand reasoning as MatchesTable/TokensTable.
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # Completed-match archives (league_site/matches/serialization.py's
  # `archive_key`: archives/{year}/{match_id}.json) and future dataset
  # exports (docs/architecture.md's "Open dataset export").
  ArchiveBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: "league-of-agents-${StageName}-archive-${AWS::AccountId}"
      # Lifecycle transitions move archives to cheaper storage classes as
      # they age — the "storage lifetime" cost control docs/architecture.md
      # describes. Standard-IA at 30 days, then Glacier at 90: archived
      # matches are read-rarely, so paying Standard's per-GB rate past the
      # first month has no benefit against the ceiling.
      LifecycleConfiguration:
        Rules:
          - Id: archive-to-ia-then-glacier
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER
                TransitionInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # The hard 20 USD/month ceiling, enforced as a notification (AWS Budgets
  # cannot itself halt spend — see docs/deploy.md for what this does and
  # does not guarantee). Two thresholds: an early warning at 80% of
  # actual spend so far this month, and a forecast breach at 100% so an
  # operator finds out *before* the ceiling is actually crossed, not after.
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName:
          Fn::Sub: "league-of-agents-${StageName}-monthly-ceiling"
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount:
            Ref: MonthlyBudgetUsd
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address:
                Ref: BudgetAlertEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address:
                Ref: BudgetAlertEmail

Outputs:
  ApiUrl:
    Description: Base URL of the deployed HTTP API.
    Value:
      Fn::Sub: "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  MatchesTableName:
    Description: Name of the deployed DynamoDB matches table.
    Value:
      Ref: MatchesTable
  TokensTableName:
    Description: Name of the deployed DynamoDB agent-tokens table.
    Value:
      Ref: TokensTable
  RatingsTableName:
    Description: Name of the deployed DynamoDB ratings-ledger table.
    Value:
      Ref: RatingsTable
  ArchiveBucketName:
    Description: Name of the deployed S3 archive bucket.
    Value:
      Ref: ArchiveBucket
